name: Daily AI/DS News Digest

on:
  schedule:
    # Chạy 9:00 sáng giờ Việt Nam (UTC+7) = 2:00 UTC (dự phòng, có thể bị GitHub trễ/bỏ qua)
    - cron: "0 2 * * *"
  repository_dispatch:
    types: [daily-trigger] # để dịch vụ ngoài (cron-job.org) ép chạy đúng giờ
  workflow_dispatch: {} # cho phép bấm chạy tay để test

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài thư viện
        run: pip install feedparser google-genai python-dotenv certifi

      - name: Chạy news agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python3 news_agent.py

      - name: Commit bản tin mới vào repo
        run: |
          git config user.name "News Agent Bot"
          git config user.email "bot@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Bản tin ngày $(date +%Y-%m-%d)"
          git push